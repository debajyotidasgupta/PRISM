# Stage 0: LoRA hypothesis validation
# Train 5 domain-specific LoRA adapters + 1 general LoRA
# Validates the core hypothesis before full PRISM training

backbone_name: "Qwen/Qwen3.5-0.8B"
n_domains: 5
domains:
  - algebra
  - geometry
  - combinatorics
  - number_theory
  - miscellaneous

# LoRA config
lora_r: 16
lora_alpha: 32
lora_target_modules:
  - q_proj
  - v_proj
lora_dropout: 0.05

# Data
n_per_domain: 2500
trace_max_tokens: 4096
teacher_model: "Qwen/Qwen3.5-35B-A3B"
teacher_model_secondary: "Qwen/Qwen3-VL-8B-Instruct"

# Training
epochs: 3
batch_size: 16
grad_accum_steps: 4
lr: 5e-5
warmup_steps: 50
weight_decay: 0.01
grad_clip: 1.0
max_seq_len: 1024

# Eval
eval_benchmarks:
  - math500
eval_max_samples: 500
