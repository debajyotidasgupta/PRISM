# Benchmark evaluation configuration

benchmarks:
  primary:
    - name: olymmath
      dataset: "RUC-AIBOX/OlymMATH"
      split: test
      filter:
        language: en
        difficulty: hard
      max_samples: 100
      metric: exact_match

    - name: olympiadbench
      dataset: "Hothan/OlympiadBench"
      split: test
      filter:
        language: English
      max_samples: 2126
      metric: exact_match

  secondary:
    - name: omnimath
      dataset: "KbsdJames/Omni-MATH"
      split: test
      max_samples: 4428
      metric: exact_match

  validation:
    - name: math500
      dataset: "HuggingFaceH4/MATH-500"
      split: test
      max_samples: 500
      metric: exact_match

baselines:
  - name: "qwen35_08b_nothink"
    model: "Qwen/Qwen3.5-0.8B"
    enable_thinking: false

  - name: "qwen35_08b_think"
    model: "Qwen/Qwen3.5-0.8B"
    enable_thinking: true

  - name: "qwen35_7b_think"
    model: "Qwen/Qwen3.5-7B"
    enable_thinking: true

  - name: "qwen25_vl_3b"
    model: "Qwen/Qwen2.5-VL-3B-Instruct"
    enable_thinking: false

output_dir: "results"
max_new_tokens: 512
temperature: 0.0
